<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>ミニ四駆 コース設計Webアプリ</title>
  <style>
    :root { --bg:#f3f4f6; --panel:#fff; --line:#d1d5db; --text:#111827; --muted:#6b7280; }
    *{box-sizing:border-box} body{margin:0;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:var(--bg);color:var(--text);overscroll-behavior:none}
    header{position:sticky;top:0;z-index:10;background:var(--panel);border-bottom:1px solid var(--line);padding:8px} h1{font-size:16px;margin:0}.headerTop{display:flex;align-items:center;justify-content:space-between;gap:8px}.settingsToggle{padding:7px 10px;border-radius:9px;font-size:12px;background:#e5e7eb;white-space:nowrap}
    .controls{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:6px;margin-top:6px}.controls.collapsed{display:none}.controls label{font-size:11px;color:var(--muted);display:flex;flex-direction:column;gap:2px}
    input{width:100%;font-size:14px;padding:6px;border:1px solid var(--line);border-radius:8px} main{padding-bottom:172px}
    #canvasWrap{width:100vw;height:calc(100vh - 185px);min-height:360px;background:#e5e7eb;overflow:hidden;touch-action:none;position:relative} canvas{display:block;width:100%;height:100%;background:white}
    #info{background:var(--panel);border-top:1px solid var(--line);border-bottom:1px solid var(--line);padding:8px;font-size:12px;line-height:1.45;word-break:break-word}
    .pad{display:grid;grid-template-columns:repeat(3,1fr);gap:4px;background:#f9fafb;border-top:1px solid var(--line);padding:8px}
    .bottomBar{position:fixed;bottom:0;left:0;right:0;z-index:20;background:rgba(255,255,255,.97);border-top:1px solid var(--line);padding:8px;display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:6px;backdrop-filter:blur(8px);max-height:42vh;overflow-y:auto;-webkit-overflow-scrolling:touch}
    button{border:0;border-radius:10px;padding:10px 6px;font-weight:700;font-size:13px;color:#111827;background:#e5e7eb;touch-action:manipulation} button:active{transform:translateY(1px)}
    .primary{background:#dbeafe;color:#1d4ed8}.danger{background:#fee2e2;color:#b91c1c}.dark{background:#111827;color:white}.green{background:#dcfce7;color:#166534}.orange{background:#ffedd5;color:#c2410c}.yellow{background:#fef08a;color:#854d0e}
    .seqWrap{padding:8px;background:#fff;border-top:1px solid var(--line);font-size:12px}.seqButtons{display:flex;flex-wrap:wrap;gap:4px;margin-top:6px}.seqBtn{padding:5px 7px;border-radius:7px;font-size:12px;background:#f3f4f6;border:1px solid #d1d5db}.seqBtn.selected{outline:3px solid #f59e0b;background:#fffbeb}.seqBtn.S{background:#fff}.seqBtn.L{background:#fee2e2}.seqBtn.R{background:#dbeafe}.seqBtn.WAVE{background:#fef08a}.seqBtn.LC{background:#111827;color:#fff}.seqBtn.BANK{background:#ffedd5}.seqBtn.SLOPE_UP,.seqBtn.SLOPE_DN{background:#dcfce7}
    .editPanel{display:none;gap:6px;flex-wrap:wrap;align-items:center;margin-top:8px;padding:8px;border:1px solid #e5e7eb;border-radius:10px;background:#f9fafb}.editPanel.show{display:flex}.editPanel span{font-weight:700}.miniBtn{padding:7px 9px;font-size:12px}
    .modalOverlay{position:fixed;inset:0;z-index:100;background:rgba(0,0,0,.45);display:none;align-items:center;justify-content:center;padding:12px}.modalBox{width:min(1100px,96vw);max-height:88vh;overflow:auto;background:#fff;border-radius:14px;box-shadow:0 20px 50px rgba(0,0,0,.25);padding:12px}.modalHeader{display:flex;justify-content:space-between;align-items:center;gap:8px;margin-bottom:8px}.modalHeader h2{font-size:16px;margin:0}.summary{font-size:13px;line-height:1.5;background:#f9fafb;border:1px solid #e5e7eb;border-radius:10px;padding:8px;margin-bottom:8px}.table{width:100%;border-collapse:collapse;font-size:12px}.table th,.table td{border:1px solid #e5e7eb;padding:6px;vertical-align:top}.table th{background:#f3f4f6;position:sticky;top:0;z-index:1}.okRow{background:#f0fdf4}.applyBtn{background:#dcfce7;color:#166534;padding:8px 10px;white-space:nowrap}.pos{color:#1d4ed8;font-weight:700}.neg{color:#b91c1c;font-weight:700}.small{font-size:12px;color:#6b7280;line-height:1.5}
    @media (min-width:760px){.controls{grid-template-columns:repeat(8,minmax(0,1fr))}#canvasWrap{height:calc(100vh - 210px)}.bottomBar{grid-template-columns:repeat(8,minmax(0,1fr))}}
  </style>
</head>
<body>
<header><div class="headerTop"><h1>ミニ四駆 コース設計Webアプリ</h1><div style="display:flex;gap:6px"><button class="settingsToggle" onclick="scrollToSequence()">順番表示</button><button id="settingsToggle" class="settingsToggle" onclick="toggleSettings()">設定表示</button></div></div><div id="settingsPanel" class="controls collapsed">
<label>部屋幅mm<input id="roomW" type="number" value="5000"></label><label>部屋奥行mm<input id="roomH" type="number" value="5000"></label><label>移動量mm<input id="moveStep" type="number" value="100"></label><label>ストレート所持<input id="ownedS" type="number" value="32"></label><label>カーブ所持<input id="ownedC" type="number" value="32"></label><label>スロープ上り<input id="ownedUp" type="number" value="6"></label><label>スロープ下り<input id="ownedDn" type="number" value="6"></label><label>バンク<input id="ownedBank" type="number" value="6"></label><label>ウェーブ<input id="ownedWave" type="number" value="6"></label><label>LC<input id="ownedLC" type="number" value="1"></label>
</div></header>
<main><section class="pad"><button></button><button onclick="moveCourse(0,-1)">↑</button><button></button><button onclick="moveCourse(-1,0)">←</button><button onclick="rotateCourse(45)">↻45°</button><button onclick="moveCourse(1,0)">→</button><button onclick="rotateCourse(-45)">↺45°</button><button onclick="moveCourse(0,1)">↓</button><button onclick="fitView()">全体表示</button></section><div id="canvasWrap"><canvas id="courseCanvas"></canvas></div><div id="info"></div><div class="seqWrap"><b>順番:</b><div id="seqButtons" class="seqButtons"></div><div id="editPanel" class="editPanel"><span id="editLabel"></span><button class="miniBtn" onclick="replaceSelected('S')">S</button><button class="miniBtn danger" onclick="replaceSelected('L')">左45°</button><button class="miniBtn primary" onclick="replaceSelected('R')">右45°</button><button class="miniBtn yellow" onclick="replaceSelected('WAVE')">WAVE</button><button class="miniBtn dark" onclick="replaceSelected('LC')">LC</button><button class="miniBtn green" onclick="replaceSelected('SLOPE_UP')">スロープ上</button><button class="miniBtn green" onclick="replaceSelected('SLOPE_DN')">スロープ下</button><button class="miniBtn orange" onclick="replaceSelected('BANK')">バンク</button><button class="miniBtn danger" onclick="deleteSelected()">削除</button></div></div></main>
<div id="adviceModal" class="modalOverlay"><div class="modalBox"><div class="modalHeader"><h2>接続アドバイス</h2><button onclick="closeAdvice()">閉じる</button></div><div id="adviceBody"></div></div></div>
<nav class="bottomBar"><button onclick="addPiece('S')">ストレート</button><button onclick="addPiece('L')" class="danger">左45°</button><button onclick="addPiece('R')" class="primary">右45°</button><button onclick="addPiece('SLOPE_UP')" class="green">スロープ上</button><button onclick="addPiece('SLOPE_DN')" class="green">スロープ下</button><button onclick="addPiece('BANK')" class="orange">バンク</button><button onclick="addPiece('WAVE')" class="yellow">ウェーブ</button><button onclick="addPiece('LC')" class="dark">LC</button><button onclick="undo()">Undo</button><button onclick="redo()">Redo</button><button onclick="showAdvice()">接続アドバイス</button><button onclick="resetCourse()" class="danger">リセット</button><button onclick="savePNG()">画像保存</button></nav>
<script>
'use strict';
const STRAIGHT=540, TRACK_WIDTH=354, CURVE_RADIUS=540, CURVE_ANGLE=45, SLOPE_HEIGHT=110, SLOPE_LENGTH=STRAIGHT, BANK_LENGTH=210, WAVE_LENGTH=540, LANE_CHANGE_LENGTH=STRAIGHT*3, CROSSING_OK_HEIGHT=80, CLOSE_TOLERANCE=20;
const canvas=document.getElementById('courseCanvas'), ctx=canvas.getContext('2d'), wrap=document.getElementById('canvasWrap'), info=document.getElementById('info'), seqButtons=document.getElementById('seqButtons'), editPanel=document.getElementById('editPanel'), editLabel=document.getElementById('editLabel'), adviceModal=document.getElementById('adviceModal'), adviceBody=document.getElementById('adviceBody'), bottomBar=document.querySelector('.bottomBar');
let startPose={x:2500,y:2500,z:0,heading:0}, pose={...startPose}, sequence=[], redoStack=[], undoStack=[], segments=[], selectedIndex=null, lastAdviceCandidates=[]; let view={scale:.08,ox:40,oy:40}; let pointerState={active:false,id:null,x:0,y:0,ox:0,oy:0}; let activePointers=new Map(); let pinchState=null;
function escapeHtml(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#039;')} function updateBottomPadding(){if(!bottomBar)return;document.documentElement.style.setProperty('--bottom-pad',(bottomBar.getBoundingClientRect().height+18)+'px')} function scrollToSequence(){updateBottomPadding();document.querySelector('.seqWrap').scrollIntoView({behavior:'smooth',block:'center'})} function toggleSettings(){const p=document.getElementById('settingsPanel'),b=document.getElementById('settingsToggle');p.classList.toggle('collapsed');b.textContent=p.classList.contains('collapsed')?'設定表示':'設定非表示';setTimeout(()=>{resizeCanvas();updateBottomPadding()},50)} function clampScale(s){return Math.max(0.012,Math.min(2.5,s))} function zoomAt(screenX,screenY,factor){const rect=canvas.getBoundingClientRect(),mx=screenX-rect.left,my=screenY-rect.top,wxBefore=(mx-view.ox)/view.scale,wyBefore=(my-view.oy)/view.scale;view.scale=clampScale(view.scale*factor);view.ox=mx-wxBefore*view.scale;view.oy=my-wyBefore*view.scale;draw()} function val(id,f){const el=document.getElementById(id);const n=Number(el?el.value:f);return Number.isFinite(n)?n:f} function deg(a){return a*Math.PI/180} function mod(a,b){return ((a%b)+b)%b} function wx(x){return x*view.scale+view.ox} function wy(y){return y*view.scale+view.oy}
function saveState(){undoStack.push(sequence.slice()); if(undoStack.length>100)undoStack.shift(); redoStack=[]} function restoreSeq(seq){sequence=seq.slice(); if(selectedIndex!==null&&selectedIndex>=sequence.length)selectedIndex=null; rebuild()} function undo(){if(undoStack.length){redoStack.push(sequence.slice()); restoreSeq(undoStack.pop());return} if(sequence.length){redoStack.push(sequence.slice());sequence.pop();rebuild()}} function redo(){if(!redoStack.length)return; undoStack.push(sequence.slice()); restoreSeq(redoStack.pop())}
function resizeCanvas(){const dpr=window.devicePixelRatio||1;const rect=wrap.getBoundingClientRect();canvas.width=Math.max(1,Math.floor(rect.width*dpr));canvas.height=Math.max(1,Math.floor(rect.height*dpr));canvas.style.width=rect.width+'px';canvas.style.height=rect.height+'px';ctx.setTransform(dpr,0,0,dpr,0,0);draw()} window.addEventListener('resize',()=>{resizeCanvas();updateBottomPadding()});
function resetCourse(){startPose={x:val('roomW',5000)/2,y:val('roomH',5000)/2,z:0,heading:0};sequence=[];redoStack=[];undoStack=[];selectedIndex=null;rebuild();fitView()} function rebuild(){pose={...startPose};segments=[];for(let i=0;i<sequence.length;i++)applyPiece(sequence[i],false,i);draw();renderSequenceButtons()}
function countParts(seq=sequence){const c={S:0,CURVE:0,SLOPE_UP:0,SLOPE_DN:0,BANK:0,WAVE:0,LC:0};for(const p of seq){if(p==='S')c.S++;else if(p==='L'||p==='R')c.CURVE++;else if(p==='SLOPE_UP')c.SLOPE_UP++;else if(p==='SLOPE_DN')c.SLOPE_DN++;else if(p==='BANK')c.BANK++;else if(p==='WAVE')c.WAVE++;else if(p==='LC')c.LC++}return c} function inventoryOK(seq){const c=countParts(seq);return c.S<=val('ownedS',32)&&c.CURVE<=val('ownedC',32)&&c.SLOPE_UP<=val('ownedUp',6)&&c.SLOPE_DN<=val('ownedDn',6)&&c.BANK<=val('ownedBank',6)&&c.WAVE<=val('ownedWave',6)&&c.LC<=val('ownedLC',1)}
function addPiece(piece){const test=sequence.concat(piece);if(!inventoryOK(test)){alert('このパーツを追加すると所持数を超えます。');return}saveState();sequence.push(piece);selectedIndex=sequence.length-1;rebuild()} function replaceSelected(piece){if(selectedIndex===null)return;const test=sequence.slice();test[selectedIndex]=piece;if(!inventoryOK(test)){alert('この変更を行うと所持数を超えます。');return}saveState();sequence=test;rebuild()} function deleteSelected(){if(selectedIndex===null)return;saveState();sequence.splice(selectedIndex,1);if(selectedIndex>=sequence.length)selectedIndex=sequence.length?sequence.length-1:null;rebuild()} function selectPiece(i){selectedIndex=i;draw();renderSequenceButtons()}
function pieceShort(p){return {S:'S',L:'L',R:'R',WAVE:'W',LC:'LC',SLOPE_UP:'UP',SLOPE_DN:'DN',BANK:'B'}[p]||p} function renderSequenceButtons(){seqButtons.innerHTML='';sequence.forEach((p,i)=>{const b=document.createElement('button');b.className='seqBtn '+p+(i===selectedIndex?' selected':'');b.textContent=(i+1)+':'+pieceShort(p);b.onclick=()=>selectPiece(i);seqButtons.appendChild(b)});if(selectedIndex===null){editPanel.classList.remove('show')}else{editPanel.classList.add('show');editLabel.textContent=(selectedIndex+1)+'番目: '+pieceShort(sequence[selectedIndex])}}
function applyPiece(piece,pushSeq=true,index=-1){if(piece==='S')addStraightLike('S',STRAIGHT,0,pushSeq,index);else if(piece==='L'||piece==='R')addCurve(piece,pushSeq,index);else if(piece==='SLOPE_UP')addStraightLike('SLOPE_UP',SLOPE_LENGTH,SLOPE_HEIGHT,pushSeq,index);else if(piece==='SLOPE_DN')addStraightLike('SLOPE_DN',SLOPE_LENGTH,-SLOPE_HEIGHT,pushSeq,index);else if(piece==='BANK')addStraightLike('BANK',BANK_LENGTH,0,pushSeq,index);else if(piece==='WAVE')addWave(pushSeq,index);else if(piece==='LC')addStraightLike('LC',LANE_CHANGE_LENGTH,0,pushSeq,index)}
function addStraightLike(kind,length,dz,pushSeq=true,index=-1){const p={...pose},r=deg(p.heading);const end={x:p.x+Math.cos(r)*length,y:p.y+Math.sin(r)*length,z:p.z+dz,heading:p.heading};segments.push({kind,index,start:p,end,points:[[p.x,p.y],[end.x,end.y]],zStart:p.z,zEnd:end.z});pose=end;if(pushSeq)sequence.push(kind)}
function addWave(pushSeq=true,index=-1){const p={...pose},r=deg(p.heading),points=[],steps=32;for(let i=0;i<steps;i++){const t=i/(steps-1),x=p.x+Math.cos(r)*(WAVE_LENGTH*t),yb=p.y+Math.sin(r)*(WAVE_LENGTH*t),nx=-Math.sin(r),ny=Math.cos(r),wave=Math.sin(t*Math.PI*2)*120;points.push([x+nx*wave,yb+ny*wave])}const last=points[points.length-1],end={x:last[0],y:last[1],z:p.z,heading:p.heading};segments.push({kind:'WAVE',index,start:p,end,points,zStart:p.z,zEnd:p.z});pose=end;if(pushSeq)sequence.push('WAVE')}
function addCurve(turn,pushSeq=true,index=-1){const p={...pose},sign=turn==='L'?-1:1,hr=deg(p.heading),normal=hr+sign*Math.PI/2,cx=p.x+Math.cos(normal)*CURVE_RADIUS,cy=p.y+Math.sin(normal)*CURVE_RADIUS,sa=Math.atan2(p.y-cy,p.x-cx),ea=sa+sign*deg(CURVE_ANGLE),points=[],steps=24;for(let i=0;i<steps;i++){const t=i/(steps-1),a=sa+(ea-sa)*t;points.push([cx+Math.cos(a)*CURVE_RADIUS,cy+Math.sin(a)*CURVE_RADIUS])}const last=points[points.length-1],end={x:last[0],y:last[1],z:p.z,heading:mod(p.heading+sign*CURVE_ANGLE,360)};segments.push({kind:turn,index,start:p,end,points,zStart:p.z,zEnd:p.z});pose=end;if(pushSeq)sequence.push(turn)}
function moveCourse(dx,dy){saveState();const step=val('moveStep',100);startPose.x+=dx*step;startPose.y+=dy*step;rebuild()} function rotateCourse(delta){saveState();startPose.heading=mod(startPose.heading+delta,360);rebuild()}
function bounds(){let xs=[startPose.x],ys=[startPose.y];for(const s of segments){for(const p of s.points){xs.push(p[0]);ys.push(p[1])}}const m=TRACK_WIDTH/2;return{minX:Math.min(...xs)-m,minY:Math.min(...ys)-m,maxX:Math.max(...xs)+m,maxY:Math.max(...ys)+m}} function fitView(){const b=bounds(),roomW=val('roomW',5000),roomH=val('roomH',5000),minX=Math.min(0,b.minX),minY=Math.min(0,b.minY),maxX=Math.max(roomW,b.maxX),maxY=Math.max(roomH,b.maxY),w=canvas.clientWidth||1,h=canvas.clientHeight||1,margin=24;view.scale=Math.min((w-margin*2)/Math.max(1,maxX-minX),(h-margin*2)/Math.max(1,maxY-minY));view.ox=margin-minX*view.scale;view.oy=margin-minY*view.scale;draw()}
function calcTotalLength(){let total=0;for(const seg of segments){for(let i=0;i<seg.points.length-1;i++){const a=seg.points[i],b=seg.points[i+1];total+=Math.hypot(b[0]-a[0],b[1]-a[1])}}return total} function evalCourse(){const b=bounds(),roomW=val('roomW',5000),roomH=val('roomH',5000),cw=b.maxX-b.minX,ch=b.maxY-b.minY,fits=cw<=roomW&&ch<=roomH,dist=Math.hypot(pose.x-startPose.x,pose.y-startPose.y),angleErr=Math.abs(mod(pose.heading-startPose.heading+180,360)-180),closed=dist<=CLOSE_TOLERANCE&&angleErr<=1&&Math.abs(pose.z-startPose.z)<=1,crossings=detectCrossings(),badCrossings=crossings.filter(c=>!c.ok),badSlope=hasBadSlopeCurveConnection(sequence),totalLength=calcTotalLength();return{b,cw,ch,fits,dist,angleErr,closed,crossings,badCrossings,badSlope,totalLength}}
function hasBadSlopeCurveConnection(seq){const slopes=new Set(['SLOPE_UP','SLOPE_DN']),curves=new Set(['L','R']);for(let i=0;i<seq.length-1;i++){if(slopes.has(seq[i])&&curves.has(seq[i+1]))return true;if(curves.has(seq[i])&&slopes.has(seq[i+1]))return true}return false}
function detectCrossings(){const lines=[];for(let si=0;si<segments.length;si++){const seg=segments[si],denom=Math.max(seg.points.length-1,1);for(let i=0;i<seg.points.length-1;i++){const t1=i/denom,t2=(i+1)/denom,z1=seg.zStart+(seg.zEnd-seg.zStart)*t1,z2=seg.zStart+(seg.zEnd-seg.zStart)*t2;lines.push({si,a:seg.points[i],b:seg.points[i+1],z1,z2})}}const out=[];for(let i=0;i<lines.length;i++){for(let j=i+1;j<lines.length;j++){const A=lines[i],B=lines[j];if(Math.abs(A.si-B.si)<=1)continue;if((A.si===0&&B.si===segments.length-1)||(B.si===0&&A.si===segments.length-1))continue;const hit=lineHit(A.a,A.b,B.a,B.b);if(!hit)continue;const za=A.z1+(A.z2-A.z1)*hit.t,zb=B.z1+(B.z2-B.z1)*hit.u,zd=Math.abs(za-zb);if(!out.some(q=>Math.hypot(q.x-hit.x,q.y-hit.y)<40))out.push({x:hit.x,y:hit.y,zDiff:zd,ok:zd>=CROSSING_OK_HEIGHT})}}return out}
function lineHit(a1,a2,b1,b2){const[x1,y1]=a1,[x2,y2]=a2,[x3,y3]=b1,[x4,y4]=b2,den=(x1-x2)*(y3-y4)-(y1-y2)*(x3-x4);if(Math.abs(den)<1e-9)return null;const t=((x1-x3)*(y3-y4)-(y1-y3)*(x3-x4))/den,u=((x1-x3)*(y1-y2)-(y1-y3)*(x1-x2))/den;if(t>0&&t<1&&u>0&&u<1)return{x:x1+t*(x2-x1),y:y1+t*(y2-y1),t,u};return null}
function pieceColor(k){return{S:'#fff',R:'#3366ff',L:'#ff3333',SLOPE_UP:'#00aa00',SLOPE_DN:'#55dd55',BANK:'#ff9900',WAVE:'#facc15',LC:'#111'}[k]||'#fff'} function drawSegmentToContext(t,points,color,width,TX,TY){if(points.length<2)return;t.strokeStyle=color;t.lineWidth=width;t.lineCap='round';t.lineJoin='round';t.beginPath();t.moveTo(TX(points[0][0]),TY(points[0][1]));for(let i=1;i<points.length;i++)t.lineTo(TX(points[i][0]),TY(points[i][1]));t.stroke()}
function draw(){const w=canvas.clientWidth||1,h=canvas.clientHeight||1;ctx.clearRect(0,0,w,h);const roomW=val('roomW',5000),roomH=val('roomH',5000),ev=evalCourse();ctx.save();ctx.lineWidth=2;ctx.setLineDash([8,4]);ctx.strokeStyle='#f59e0b';ctx.strokeRect(wx(0),wy(0),roomW*view.scale,roomH*view.scale);ctx.setLineDash([]);ctx.fillStyle='#d97706';ctx.font='bold 12px sans-serif';ctx.fillText('部屋枠 '+(roomW/1000).toFixed(2)+'m × '+(roomH/1000).toFixed(2)+'m',wx(0)+8,wy(0)+18);ctx.restore();const iw=Math.max(4,TRACK_WIDTH*view.scale*.62),cw=Math.max(2,TRACK_WIDTH*view.scale*.16);for(const seg of segments){drawSegmentToContext(ctx,seg.points,'#ddd',iw,wx,wy);drawSegmentToContext(ctx,seg.points,pieceColor(seg.kind),cw,wx,wy)}if(selectedIndex!==null){const seg=segments.find(s=>s.index===selectedIndex);if(seg)drawSegmentToContext(ctx,seg.points,'#f59e0b',Math.max(8,TRACK_WIDTH*view.scale*.28),wx,wy)}for(let i=0;i<ev.crossings.length;i++){const c=ev.crossings[i];ctx.beginPath();ctx.fillStyle=c.ok?'lime':'red';ctx.arc(wx(c.x),wy(c.y),9,0,Math.PI*2);ctx.fill();ctx.strokeStyle='#111827';ctx.stroke()}drawStartEnd(ctx,wx,wy,ev,false);const r=deg(pose.heading);ctx.strokeStyle='purple';ctx.lineWidth=3;ctx.beginPath();ctx.moveTo(wx(pose.x),wy(pose.y));ctx.lineTo(wx(pose.x)+Math.cos(r)*50,wy(pose.y)+Math.sin(r)*50);ctx.stroke();updateInfo(ev)}
function drawPoint(t,x,y,color,label,TX,TY,dx=10,dy=-10,exportMode=false){const px=TX(x),py=TY(y);t.beginPath();t.fillStyle=color;t.arc(px,py,exportMode?12:7,0,Math.PI*2);t.fill();t.strokeStyle='#111';t.stroke();t.font=exportMode?'bold 20px sans-serif':'bold 12px sans-serif';const lx=px+dx,ly=py+dy,m=t.measureText(label);t.fillStyle='rgba(255,255,255,.88)';t.fillRect(lx-3,ly-(exportMode?18:12),m.width+6,exportMode?24:17);t.fillStyle='#111827';t.fillText(label,lx,ly)}
function drawStartEnd(t,TX,TY,ev,exportMode){const sx=TX(startPose.x),sy=TY(startPose.y),ex=TX(pose.x),ey=TY(pose.y),closeOnScreen=Math.hypot(ex-sx,ey-sy)<(exportMode?80:45);if(ev.closed){drawPoint(t,startPose.x,startPose.y,'orange','START / GOAL',TX,TY,14,-14,exportMode);t.beginPath();t.strokeStyle='#16a34a';t.lineWidth=exportMode?5:3;t.arc(sx,sy,exportMode?24:16,0,Math.PI*2);t.stroke();t.fillStyle='#16a34a';t.font=exportMode?'bold 20px sans-serif':'bold 12px sans-serif';t.fillText('CLOSED',sx+(exportMode?30:22),sy+(exportMode?22:18))}else{drawPoint(t,startPose.x,startPose.y,'orange','START',TX,TY,10,closeOnScreen?-26:-10,exportMode);drawPoint(t,pose.x,pose.y,'purple','END '+ev.dist.toFixed(0)+'mm',TX,TY,10,closeOnScreen?28:18,exportMode);t.setLineDash([8,6]);t.strokeStyle='red';t.lineWidth=exportMode?4:2;t.beginPath();t.moveTo(sx,sy);t.lineTo(ex,ey);t.stroke();t.setLineDash([])}}
function updateInfo(ev){const c=countParts(),status=[ev.closed?'閉路OK':'未閉路',ev.fits?'部屋内OK':'部屋外',ev.crossings.length?'交差あり':'交差なし',ev.badSlope?'直カーブNG':'直カーブOK'];info.textContent='状態: '+status.join(' / ')+'\n'+'パーツ数:'+sequence.length+' / ストレート:'+c.S+'/'+val('ownedS',32)+' / カーブ:'+c.CURVE+'/'+val('ownedC',32)+' / スロープUP:'+c.SLOPE_UP+'/'+val('ownedUp',6)+' / スロープDN:'+c.SLOPE_DN+'/'+val('ownedDn',6)+' / バンク:'+c.BANK+'/'+val('ownedBank',6)+' / ウェーブ:'+c.WAVE+'/'+val('ownedWave',6)+' / LC:'+c.LC+'/'+val('ownedLC',1)+'\n'+'コース全長:'+(ev.totalLength/1000).toFixed(2)+'m / コース外形:'+(ev.cw/1000).toFixed(2)+'m × '+(ev.ch/1000).toFixed(2)+'m / 終点ズレ:'+ev.dist.toFixed(1)+'mm / 角度ズレ:'+ev.angleErr.toFixed(1)+'° / 高さz:'+pose.z.toFixed(0)+'mm / 交差:'+ev.crossings.length+' / 要対策交差:'+ev.badCrossings.length}
function simulateNextPose(basePose,piece){let oldPose=pose;pose={...basePose};let before=segments.length;applyPiece(piece,false,-1);let p={...pose};segments.length=before;pose=oldPose;return p} function candidateEndPose(fullSeq){let p={...startPose};for(const piece of fullSeq)p=simulateNextPose(p,piece);return p}
function pathToJapanese(path){const names={S:'ストレート',L:'左45°',R:'右45°',WAVE:'ウェーブ',LC:'LC',SLOPE_UP:'スロープ上り',SLOPE_DN:'スロープ下り',BANK:'バンク'};if(!path||!path.length)return'なし';return path.map(p=>names[p]||p).join(' → ')} function editPositionText(c){if(c.startIndex>=sequence.length)return'末尾';return(c.startIndex+1)+'番目から'} function signedClass(v){return v>=0?'pos':'neg'} function signedText(v){return(v>=0?'+':'')+v.toFixed(1)}
function makeAddPaths(maxDepth){const pieces=['S','L','R'];const paths=[[]];function rec(path,depth){if(depth>=maxDepth)return;for(const p of pieces){const next=path.concat(p);paths.push(next);rec(next,depth+1)}}rec([],0);return paths}
function scoreEditCandidate(originalDx,originalDy,startIndex,removeCount,addPath){const removed=sequence.slice(startIndex,startIndex+removeCount);if(removeCount===0&&addPath.length===0)return null;if(removed.join(',')===addPath.join(','))return null;const fullSeq=sequence.slice(0,startIndex).concat(addPath).concat(sequence.slice(startIndex+removeCount));if(!inventoryOK(fullSeq)||hasBadSlopeCurveConnection(fullSeq))return null;const p=candidateEndPose(fullSeq),dx=startPose.x-p.x,dy=startPose.y-p.y,dist=Math.hypot(dx,dy),angleErr=Math.abs(mod(p.heading-startPose.heading+180,360)-180),zErr=Math.abs(p.z-startPose.z),closed=dist<=CLOSE_TOLERANCE&&angleErr<=1&&zErr<=1,editCost=removeCount+addPath.length,netPartDelta=addPath.length-removeCount,fixX=dx-originalDx,fixY=dy-originalDy,score=dist+angleErr*120+zErr*80+editCost*8+Math.abs(netPartDelta)*4;return{fullSeq,startIndex,removeCount,removed,addPath,dx,dy,fixX,fixY,dist,angleErr,zErr,closed,editCost,netPartDelta,score}}
function findConnectionCandidates(maxResults=50){const originalDx=startPose.x-pose.x,originalDy=startPose.y-pose.y;const levels=[{rm:5,add:5},{rm:7,add:6}];let last=[];for(const lv of levels){const addPaths=makeAddPaths(lv.add),results=[],maxRemove=Math.min(lv.rm,sequence.length);for(let startIndex=0;startIndex<=sequence.length;startIndex++){for(let removeCount=0;removeCount<=maxRemove;removeCount++){if(startIndex+removeCount>sequence.length)continue;for(const addPath of addPaths){const c=scoreEditCandidate(originalDx,originalDy,startIndex,removeCount,addPath);if(c&&c.closed)results.push(c)}}}results.sort((a,b)=>a.editCost-b.editCost||a.dist-b.dist||a.angleErr-b.angleErr||a.score-b.score);last=results;if(results.length)return pickCandidates(results,maxResults,lv)}return{candidates:[],hasClosed:false,closedTotal:last.length,levelText:'削除最大7個 / 追加最大6個'}}
function pickCandidates(results,maxResults,lv){const picked=[],seen=new Set();for(const r of results){const key=r.startIndex+':'+r.removeCount+':'+r.addPath.join(',');if(seen.has(key))continue;seen.add(key);picked.push(r);if(picked.length>=maxResults)break}return{candidates:picked,hasClosed:picked.length>0,closedTotal:results.length,levelText:'削除最大'+lv.rm+'個 / 追加最大'+lv.add+'個'}}
function showAdvice(){try{const result=findConnectionCandidates(50),ev=evalCourse(),dx=startPose.x-pose.x,dy=startPose.y-pose.y;lastAdviceCandidates=result.candidates;let html='<div class="summary"><b>現在のズレ</b><br>ΔX='+dx.toFixed(1)+'mm / ΔY='+dy.toFixed(1)+'mm / 角度差='+ev.angleErr.toFixed(1)+'° / 高さ差='+(startPose.z-pose.z).toFixed(0)+'mm<br>';html+='探索: '+escapeHtml(result.levelText)+' / S・左45°・右45°のみで置換探索<br>';html+=result.hasClosed?'<b>閉路OK候補のみ表示</b> '+result.closedTotal+'件中、上位'+result.candidates.length+'件を表示':'<b>閉路OK候補なし</b>。接続できない参考候補は表示しません。';html+='</div>';if(!result.candidates.length){html+='<p>閉路OK候補は見つかりませんでした。</p><p class="small">条件: 残りズレ '+CLOSE_TOLERANCE+'mm以内 / 角度差1°以内 / 高さ差1mm以内。</p>';adviceBody.innerHTML=html;adviceModal.style.display='flex';return}html+='<table class="table"><thead><tr><th>順</th><th>編集位置</th><th>抜く</th><th>入れる</th><th>補正ΔX</th><th>補正ΔY</th><th>残りX</th><th>残りY</th><th>適用</th></tr></thead><tbody>';for(let i=0;i<result.candidates.length;i++){const c=result.candidates[i];html+='<tr class="okRow"><td>'+(i+1)+'<br><b>OK</b></td><td>'+escapeHtml(editPositionText(c))+'</td><td>'+escapeHtml(pathToJapanese(c.removed))+'</td><td>'+escapeHtml(pathToJapanese(c.addPath))+'</td><td class="'+signedClass(c.fixX)+'">'+signedText(c.fixX)+'</td><td class="'+signedClass(c.fixY)+'">'+signedText(c.fixY)+'</td><td class="'+signedClass(c.dx)+'">'+signedText(c.dx)+'</td><td class="'+signedClass(c.dy)+'">'+signedText(c.dy)+'</td><td><button class="applyBtn" onclick="applyAdvice('+i+')">適用</button></td></tr>'}html+='</tbody></table><p class="small">※調整候補はストレート・左45°・右45°のみ。ウェーブ/バンク/LC/スロープは位置合わせ候補から除外しています。</p>';adviceBody.innerHTML=html;adviceModal.style.display='flex'}catch(e){console.error(e);alert('接続アドバイスでエラー:\n'+e.message)}} function closeAdvice(){adviceModal.style.display='none'} function applyAdvice(index){const c=lastAdviceCandidates[index];if(!c)return;saveState();sequence=c.fullSeq.slice();selectedIndex=null;closeAdvice();rebuild()}
function drawCourseToContext(t,width,height,exportMode=false){const roomW=val('roomW',5000),roomH=val('roomH',5000),ev=evalCourse(),b=bounds(),margin=exportMode?80:24,minX=Math.min(0,b.minX),minY=Math.min(0,b.minY),maxX=Math.max(roomW,b.maxX),maxY=Math.max(roomH,b.maxY),scale=Math.min((width-margin*2)/Math.max(1,maxX-minX),(height-margin*2)/Math.max(1,maxY-minY)),ox=margin-minX*scale,oy=margin-minY*scale,TX=x=>x*scale+ox,TY=y=>y*scale+oy;t.clearRect(0,0,width,height);t.fillStyle='#fff';t.fillRect(0,0,width,height);t.save();t.lineWidth=3;t.setLineDash([10,6]);t.strokeStyle='#f59e0b';t.strokeRect(TX(0),TY(0),roomW*scale,roomH*scale);t.setLineDash([]);t.fillStyle='#d97706';t.font=exportMode?'bold 24px sans-serif':'bold 12px sans-serif';t.fillText('部屋枠 '+(roomW/1000).toFixed(2)+'m × '+(roomH/1000).toFixed(2)+'m',TX(0)+12,TY(0)+28);t.fillStyle='#111827';t.fillText('コース全長 '+(ev.totalLength/1000).toFixed(2)+'m',TX(0)+12,TY(0)+58);t.restore();const iw=Math.max(exportMode?8:4,TRACK_WIDTH*scale*.62),cw=Math.max(exportMode?4:2,TRACK_WIDTH*scale*.16);for(const seg of segments){drawSegmentToContext(t,seg.points,'#ddd',iw,TX,TY);drawSegmentToContext(t,seg.points,pieceColor(seg.kind),cw,TX,TY)}drawStartEnd(t,TX,TY,ev,exportMode)} function savePNG(){const ex=document.createElement('canvas');ex.width=1600;ex.height=2200;drawCourseToContext(ex.getContext('2d'),ex.width,ex.height,true);const a=document.createElement('a');a.download='mini4wd_course_full.png';a.href=ex.toDataURL('image/png');a.click()}
function updatePinchState(){const pts=[...activePointers.values()];if(pts.length>=2){const a=pts[0],b=pts[1];const dx=b.x-a.x,dy=b.y-a.y;pinchState={dist:Math.hypot(dx,dy),cx:(a.x+b.x)/2,cy:(a.y+b.y)/2,scale:view.scale,ox:view.ox,oy:view.oy}}else{pinchState=null;if(pts.length===1){const a=pts[0];pointerState={active:true,id:a.id,x:a.x,y:a.y,ox:view.ox,oy:view.oy}}}}
canvas.addEventListener('pointerdown',e=>{activePointers.set(e.pointerId,{id:e.pointerId,x:e.clientX,y:e.clientY});canvas.setPointerCapture(e.pointerId);if(activePointers.size===1){pointerState={active:true,id:e.pointerId,x:e.clientX,y:e.clientY,ox:view.ox,oy:view.oy}}else{pointerState.active=false;updatePinchState()}});
canvas.addEventListener('pointermove',e=>{if(!activePointers.has(e.pointerId))return;activePointers.set(e.pointerId,{id:e.pointerId,x:e.clientX,y:e.clientY});if(activePointers.size>=2&&pinchState){const pts=[...activePointers.values()],a=pts[0],b=pts[1],dx=b.x-a.x,dy=b.y-a.y,dist=Math.max(1,Math.hypot(dx,dy)),cx=(a.x+b.x)/2,cy=(a.y+b.y)/2,rect=canvas.getBoundingClientRect(),mx=pinchState.cx-rect.left,my=pinchState.cy-rect.top,worldX=(mx-pinchState.ox)/pinchState.scale,worldY=(my-pinchState.oy)/pinchState.scale;view.scale=clampScale(pinchState.scale*(dist/pinchState.dist));view.ox=(cx-rect.left)-worldX*view.scale;view.oy=(cy-rect.top)-worldY*view.scale;draw();return}if(pointerState.active&&pointerState.id===e.pointerId){view.ox=pointerState.ox+(e.clientX-pointerState.x);view.oy=pointerState.oy+(e.clientY-pointerState.y);draw()}});
function endPointer(e){activePointers.delete(e.pointerId);updatePinchState()} canvas.addEventListener('pointerup',endPointer);canvas.addEventListener('pointercancel',endPointer);
canvas.addEventListener('wheel',e=>{e.preventDefault();zoomAt(e.clientX,e.clientY,e.deltaY<0?1.1:.9)},{passive:false});for(const id of ['roomW','roomH','ownedS','ownedC','ownedUp','ownedDn','ownedBank','ownedWave','ownedLC']){const el=document.getElementById(id);if(el)el.addEventListener('change',draw)}document.addEventListener('DOMContentLoaded',()=>{resizeCanvas();resetCourse();updateBottomPadding()});resizeCanvas();resetCourse();updateBottomPadding();
</script></body></html>
